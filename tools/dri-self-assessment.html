<div class="assessment-container">

  <!-- ===== Header ===== -->

<script>
// ========== 题目数据（15题） ==========
const questions = [
  {
    id: 'q1',
    dimension: '责任清晰度',
    domain: '责任机制',
    question: '当跨部门AI项目出现延期或质量问题时，你们能否在10分钟内准确定位唯一负责人？',
    hint: 'DRI 机制的核心在于"唯一性"——每个关键决策必须有且只有一个最终负责人，避免集体负责即无人负责。',
    options: [
      { label: 'A. 经常互相推诿，需要高层协调才能明确责任归属', score: 0 },
      { label: 'B. 有名义负责人，但执行中仍需要多人共同决策', score: 1 },
      { label: 'C. 能找到主责人，但配合部门的责任边界模糊', score: 2 },
      { label: 'D. 能快速定位唯一DRI，且责任边界清晰写入项目文档', score: 3 }
    ]
  },
  {
    id: 'q2',
    dimension: '决策速度',
    domain: '决策效率',
    question: '从发现一个需要AI介入的业务问题，到正式立项并分配资源，平均需要多长时间？',
    hint: '高效组织的AI决策周期通常在2周以内。决策延迟是AI转型失败的首要原因（McKinsey, 2023）。',
    options: [
      { label: 'A. 超过3个月，需要多轮评审会议', score: 0 },
      { label: 'B. 1-3个月，需要完整的业务案例和ROI分析', score: 1 },
      { label: 'C. 2周-1个月，有标准化立项流程', score: 2 },
      { label: 'D. 1周内，DRI有权直接启动试点项目', score: 3 }
    ]
  },
  {
    id: 'q3',
    dimension: '领导力承诺',
    domain: '责任机制',
    question: 'AI转型举措主要由哪个层级推动？',
    hint: 'MIT Sloan研究表明，AI转型成功概率在CEO直接推动下提升3.2倍。缺少高层DRI的转型往往是局部优化。',
    options: [
      { label: 'A. 主要由个别部门自发尝试，无高层统筹', score: 0 },
      { label: 'B. CHO/CTO推动，但CEO参与度有限', score: 1 },
      { label: 'C. CEO指定专人负责，但未纳入战略优先级', score: 2 },
      { label: 'D. CEO本人担任AI转型DRI，定期review进展', score: 3 }
    ]
  },
  {
    id: 'q4',
    dimension: 'HR角色定位',
    domain: '责任机制',
    question: '在你们组织的AI转型中，HR部门扮演什么角色？',
    hint: 'AI时代的HR需从"支持职能"转型为"组织设计架构师"。DRI机制本身就是一种HR组织设计实践。',
    options: [
      { label: 'A. 基本不参与，认为是技术部门的事', score: 0 },
      { label: 'B. 负责AI工具培训和技能培训', score: 1 },
      { label: 'C. 参与转型设计，但不是核心决策成员', score: 2 },
      { label: 'D. HR负责人是AI转型核心DRI之一，主导组织设计', score: 3 }
    ]
  },
  {
    id: 'q5',
    dimension: '数据基础设施',

// ========== 状态 ==========
let currentStep = 1;
let answers = {};
const totalSteps = questions.length;

// ========== 初始化 ==========
function init() {
  buildProgressSteps();
  buildQuestionCards();
  showStep(1);
}

function buildProgressSteps() {
  const container = document.getElementById('progressSteps');
  container.innerHTML = '';
  for (let i = 1; i <= totalSteps; i++) {
    const dot = document.createElement('div');
    dot.className = 'progress-step-dot';
    dot.id = 'dot-' + i;
    dot.textContent = i;
    container.appendChild(dot);
  }
}

function buildQuestionCards() {
  const container = document.getElementById('questionCards');
  container.innerHTML = '';
  questions.forEach((q, idx) => {
    const step = idx + 1;
    const card = document.createElement('div');
    card.className = 'question-card' + (step === 1 ? ' active' : '');
    card.id = 'step-' + step;

    const domainTag = q.domain;

    let optionsHTML = '';
    q.options.forEach((opt, oi) => {
      const scoreClass = opt.score === 0 ? 'score-low' : opt.score === 1 ? 'score-mid' : opt.score === 2 ? 'score-high' : 'score-excellent';
      const scoreLabel = opt.score === 0 ? '薄弱' : opt.score === 1 ? '起步' : opt.score === 2 ? '良好' : '优秀';
      optionsHTML += `
        <div class="option-item" onclick="selectOption(${step}, ${oi}, this)">
          <div class="option-radio"></div>
          <span class="option-label">${opt.label}</span>
          <span class="option-score-tag ${scoreClass}">${scoreLabel}</span>
          <div class="option-check">✓</div>
        </div>
      `;
    });

    const isLast = step === totalSteps;
    card.innerHTML = `
      <div class="qc-step-label">${domainTag} · 第 ${step}/${totalSteps} 题</div>
      <div class="qc-dimension">📌 ${q.dimension}</div>
      <div class="qc-question">${q.question}</div>
      <div class="qc-hint">💡 ${q.hint}</div>
      <div class="options-list">${optionsHTML}</div>
      <div class="qc-nav">
        <button class="btn-prev" ${step === 1 ? 'style="visibility:hidden"' : ''} onclick="goToStep(${step - 1})">← 上一题</button>
        ${isLast
          ? `<button class="btn-result" id="btn-result-${step}" onclick="showResult()">查看诊断报告</button>`
          : `<button class="btn-next" id="btn-next-${step}" onclick="goToStep(${step + 1})">下一题 →</button>`
        }
      </div>
    `;
    container.appendChild(card);
  });
}

// ========== 选项点击 ==========
function selectOption(step, optIdx, el) {
  // 清除同题选中
  const card = document.getElementById('step-' + step);
  card.querySelectorAll('.option-item').forEach(item => item.classList.remove('selected'));
  el.classList.add('selected');

  // 记录答案
  answers['q' + step] = questions[step - 1].options[optIdx].score;

  // 启用下一步
  const nextBtn = document.getElementById('btn-next-' + step);
  const resultBtn = document.getElementById('btn-result-' + step);
  if (nextBtn) { nextBtn.classList.add('enabled'); }
  if (resultBtn) { resultBtn.classList.add('enabled'); }

  // 更新进度点
  const dot = document.getElementById('dot-' + step);
  if (dot) dot.classList.add('done');
}

// ========== 步骤切换 ==========
function goToStep(target) {
  if (target < 1 || target > totalSteps) return;
  const currentCard = document.getElementById('step-' + currentStep);
  const targetCard = document.getElementById('step-' + target);

  if (currentCard) {
    currentCard.style.animation = 'fadeSlideOut 0.3s ease forwards';
    setTimeout(() => {
      currentCard.classList.remove('active');
      currentCard.style.animation = '';
      if (targetCard) {
        targetCard.classList.add('active');
        targetCard.style.animation = 'fadeSlideIn 0.4s ease';
      }
    }, 280);
  }
  currentStep = target;
  updateProgress();
}

function showStep(step) {
  currentStep = step;
  updateProgress();
}

function updateProgress() {
  const pct = Math.round((currentStep / totalSteps) * 100);
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressPct').textContent = pct + '%';

  // 更新步骤点
  for (let i = 1; i <= totalSteps; i++) {
    const dot = document.getElementById('dot-' + i);
    if (!dot) continue;
    dot.classList.remove('active');
    if (i < currentStep) dot.classList.add('done');
    if (i === currentStep) dot.classList.add('active');
  }
}

// ========== 计算结果 ==========
function showResult() {
  // 检查是否全部作答
  for (let i = 1; i <= totalSteps; i++) {
    if (answers['q' + i] === undefined) {
      alert('请先完成第 ' + i + ' 题');
      goToStep(i);
      return;
    }
  }

  // 计算总分
  let totalScore = 0;
  const dimScores = {};
  questions.forEach((q, idx) => {
    const score = answers['q' + (idx + 1)];
    totalScore += score;
    if (!dimScores[q.domain]) dimScores[q.domain] = [];
    dimScores[q.domain].push({ name: q.dimension, score: score });
  });

  // 等级判定
  const maxScore = totalSteps * 3;
  const ratio = totalScore / maxScore;
  let grade, desc;
  if (ratio >= 0.8) {
    grade = '🟢 领先者';
    desc = '您的组织已建立成熟的DRI机制，AI转型具备坚实的组织基础。建议聚焦深度优化和规模化复制，巩固先发优势。';
  } else if (ratio >= 0.6) {
    grade = '🟡 探索者';
    desc = '您的组织在部分维度已建立DRI意识，但整体机制仍需系统化。建议优先补全责任清晰度和决策速度两大短板。';
  } else if (ratio >= 0.4) {
    grade = '🟠 觉醒期';
    desc = '您的组织已意识到DRI的价值，但落地程度有限。建议从一个试点项目开始，建立DRI成功案例后再推广。';
  } else {
    grade = '🔴 起步阶段';
    desc = '您的组织尚未建立系统性的DRI机制。建议从领导力承诺和责任清晰度两个维度入手，这是所有高效组织的基础。';
  }

  // 显示结果页
  document.getElementById('rcGrade').textContent = grade;
  document.getElementById('rcScore').textContent = totalScore;
  document.getElementById('rcDesc').textContent = desc;

  // 构建维度条形图
  const domainAvg = {};
  Object.keys(dimScores).forEach(domain => {
    const scores = dimScores[domain].map(d => d.score);
    const avg = scores.reduce((a, b) => a + b, 0) / scores.length;
    domainAvg[domain] = avg;
  });

  const dimContainer = document.getElementById('dimBars');
  dimContainer.innerHTML = '';
  Object.keys(domainAvg).forEach(domain => {
    const avg = domainAvg[domain];
    const pct = (avg / 3) * 100;
    const barClass = avg < 1 ? 'bar-low' : avg < 2 ? 'bar-mid' : avg < 2.5 ? 'bar-high' : 'bar-excellent';
    const statusClass = avg < 1 ? 'status-weak' : avg < 2 ? 'status-ok' : 'status-strong';

    // 该领域下的所有维度
    const dims = dimScores[domain];
    let dimsHTML = '';
    dims.forEach(d => {
      const dpct = (d.score / 3) * 100;
      const dbar = d.score < 1 ? 'bar-low' : d.score < 2 ? 'bar-mid' : d.score < 2.5 ? 'bar-high' : 'bar-excellent';
      dimsHTML += `<div class="dim-row" style="opacity:0.7; font-size:0.75rem;">
        <div class="dim-name" style="width:140px;">${d.name}</div>
        <div class="dim-bar-track"><div class="dim-bar-fill ${dbar}" style="width:${dpct}%"></div></div>
        <div class="dim-score">${d.score}/3</div>
      </div>`;
    });

    const row = document.createElement('div');
    row.innerHTML = `
      <div class="dim-row">
        <div class="dim-name"><strong>${domain}</strong></div>
        <div class="dim-bar-track"><div class="dim-bar-fill ${barClass}" data-width="${pct}"></div></div>
        <div class="dim-score">${avg.toFixed(1)}/3</div>
        <div class="dim-status ${statusClass}">${avg >= 2 ? '✅ 良好' : avg >= 1 ? '⚠️ 待提升' : '❌ 薄弱'}</div>
      </div>
      ${dimsHTML}
      <div style="height:0.8rem;"></div>
    `;
    dimContainer.appendChild(row);
  });

  // 切换显示
  document.getElementById('questionCards').style.display = 'none';
  document.querySelector('.progress-section').style.display = 'none';
  const rc = document.getElementById('resultCard');
  rc.classList.add('show');

  // 动画条形图
  setTimeout(() => {
    document.querySelectorAll('.dim-bar-fill[data-width]').forEach(bar => {
      bar.style.width = bar.dataset.width + '%';
    });
  }, 100);
}

// ========== 重新自测 ==========
function retake() {
  answers = {};
  currentStep = 1;
  document.getElementById('resultCard').classList.remove('show');
  document.querySelector('.progress-section').style.display = '';
  document.getElementById('questionCards').style.display = '';
  // 清除所有选中
  document.querySelectorAll('.option-item').forEach(el => el.classList.remove('selected'));
  document.querySelectorAll('.btn-next, .btn-result').forEach(el => el.classList.remove('enabled'));
  document.querySelectorAll('.progress-step-dot').forEach((el, i) => {
    el.classList.remove('done', 'active');
    if (i === 0) el.classList.add('active');
  });
  document.querySelectorAll('.question-card').forEach((el, i) => {
    el.classList.remove('active');
    if (i === 0) el.classList.add('active');
  });
  updateProgress();
}

// 启动
init();
