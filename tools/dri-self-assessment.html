  // ── Render all question cards ──────────────────────────────────
  var totalQ = QUESTIONS.length;
  var currentStep = 1;
  var answers = {};

  function renderCards() {
    var container = document.getElementById('quizCards');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, i) {
      var step = i + 1;
      var isFirst = (i === 0);
      var card = document.createElement('div');
      card.className = 'quiz-card' + (isFirst ? ' slide-in' : ' hidden');
      card.id = 'step-' + step;

      var optionsHtml = q.options.map(function(opt) {
        return ''
          + '<label class="option">'
          +   '<input type="radio" name="q' + step + '" value="' + opt.score + '" data-step="' + step + '">'
          +   '<div class="option-label">'
          +     '<div class="option-marker">' + opt.label + '</div>'
          +     '<div class="option-text"><strong>' + opt.label + '：' + opt.text.split('，').slice(0,2).join('，') + '</strong>' + opt.text + '</div>'
          +     '<div class="check-icon"><svg viewBox="0 0 20 20" fill="none"><circle cx="10" cy="10" r="10" fill="#16a34a"/><path d="M6 10l3 3 5-6" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>'
          +   '</div>'
          + '</label>';
      }).join('');

      var navHtml = '';
      if (step > 1) {
        navHtml += '<button class="btn-prev" onclick="prevStep(' + step + ')">← 上一题</button>';
      }
      navHtml += '<button class="btn-next" onclick="' + (step < totalQ ? 'nextStep(' + (step+1) + ')' : 'showResult()') + '" disabled>' + (step < totalQ ? '下一题 →' : '查看结果') + '</button>';

      card.innerHTML = ''
        + '<div class="question-number">' + step + '</div>'
        + '<span class="question-dimension">' + q.dimension + '</span>'
        + '<h2>' + q.question + '</h2>'
        + '<p class="hint">' + q.hint + '</p>'
        + optionsHtml
        + '<div class="quiz-nav">' + navHtml + '</div>';

      container.appendChild(card);
    });

    // Register change events
    container.querySelectorAll('input[type="radio"]').forEach(function(radio) {
      radio.addEventListener('change', function() {
        var step = parseInt(this.getAttribute('data-step'));
        document.querySelector('#step-' + step + ' .btn-next').disabled = false;
      });
    });

    renderDots();
    updateProgress();
  }

  function renderDots() {
    var container = document.getElementById('stepDots');
    container.innerHTML = '';
    for (var i = 0; i < totalQ; i++) {
      var dot = document.createElement('div');
      dot.className = 'step-dot' + (i === 0 ? ' active' : '');
      dot.id = 'dot-' + (i + 1);
      container.appendChild(dot);
    }
  }

  function updateProgress() {
    var pct = ((currentStep - 1) / totalQ * 100).toFixed(0);
    document.getElementById('progressFill').style.width = pct + '%';
    document.getElementById('progressText').textContent = currentStep + ' / ' + totalQ;
    for (var i = 1; i <= totalQ; i++) {
      var dot = document.getElementById('dot-' + i);
      dot.classList.remove('active', 'done');
      if (i < currentStep) dot.classList.add('done');
      else if (i === currentStep) dot.classList.add('active');
    }
  }

  function nextStep(step) {
    var currentCard = document.getElementById('step-' + (step - 1));
    var nextCard = document.getElementById('step-' + step);
    currentCard.classList.add('slide-out');
    setTimeout(function() {
      currentCard.classList.add('hidden');
      currentCard.classList.remove('slide-out');
      nextCard.classList.remove('hidden');
      nextCard.classList.add('slide-in');
      currentStep = step;
      updateProgress();
      window.scrollTo({ top: 0, behavior: 'smooth' });
      setTimeout(function() { nextCard.classList.remove('slide-in'); }, 400);
    }, 300);
  }

  function prevStep(step) {
    var currentCard = document.getElementById('step-' + step);
    var prevCard = document.getElementById('step-' + (step - 1));
    currentCard.classList.add('slide-out');
    setTimeout(function() {
      currentCard.classList.add('hidden');
      currentCard.classList.remove('slide-out');
      prevCard.classList.remove('hidden');
      prevCard.classList.add('slide-in');
      currentStep = step - 1;
      updateProgress();
      window.scrollTo({ top: 0, behavior: 'smooth' });
      setTimeout(function() { prevCard.classList.remove('slide-in'); }, 400);
    }, 300);
  }

  // ── Result ────────────────────────────────────────────────────
  function showResult() {
    // Hide current card
    document.getElementById('step-' + totalQ).classList.add('hidden');

    // Calculate scores
    var dimScores = [];
    var totalScore = 0;
    QUESTIONS.forEach(function(q, i) {
      var step = i + 1;
      var checked = document.querySelector('input[name="q' + step + '"]:checked');
      var score = checked ? parseInt(checked.value) : 0;
      dimScores.push({ name: q.dimension, score: score, max: 3 });
      totalScore += score;
    });
    var pct = Math.round(totalScore / (totalQ * 3) * 100);

    // Badge + Level
    var badge, level, summary;
    if (pct >= 80) {
      badge = '🟢 领先者';
      level = 'AI转型就绪度：领先 level';
      summary = '你的组织在AI转型的各核心维度上都表现出色。建议：加快规模化落地步伐，建立DRI机制确保执行力，将AI深度融入业务流程。关注公众号获取标杆案例和进阶SOP。';
    } else if (pct >= 60) {
      badge = '🟡 探索者';
      level = 'AI转型就绪度：探索 level';
      summary = '你的组织有一定的AI转型基础，多个维度表现良好，但还需要在个别关键领域加强。建议：优先补齐数据基建和中层管理者赋能，建立快速决策机制。';
    } else if (pct >= 40) {
      badge = '🟠 觉醒期';
      level = 'AI转型就绪度：觉醒 level';
      summary = '你的组织已经意识到AI转型的重要性，但在多个核心维度上还存在明显短板。建议：先从数字化基建和人才引进开始，小步快跑，积累成功案例后再扩大范围。';
    } else {
      badge = '🔴 起步阶段';
      level = 'AI转型就绪度：起步 level';
      summary = '你的组织AI转型还面临较大挑战，多个核心维度都需要系统性提升。建议：先做一次全面的数字化转型规划，明确优先级，不要盲目上AI项目。关注公众号获取详细诊断建议。';
    }

    document.getElementById('resultBadge').textContent = badge;
    document.getElementById('resultScore').innerHTML = pct + '<span>/100</span>';
    document.getElementById('resultLevel').textContent = level;
    document.getElementById('resultSummary').textContent = summary;

    // Dimension breakdown
    var grid = document.getElementById('dimensionGrid');
    grid.innerHTML = '';
    dimScores.forEach(function(ds) {
      var pct = Math.round(ds.score / ds.max * 100);
      var levelClass = ds.score >= 2 ? 'level-high' : (ds.score >= 1 ? 'level-mid' : 'level-low');
      var desc = ds.score >= 2 ? '表现良好，保持优势' : (ds.score >= 1 ? '需要关注和改进' : '亟需系统性提升');
      var card = document.createElement('div');
      card.className = 'dimension-card';
      card.innerHTML = ''
        + '<div class="dim-name">' + ds.name + '</div>'
        + '<div class="dim-score-row">'
        +   '<span class="dim-score">' + (ds.score * 33 + 1) + '/100</span>'
        +   '<div class="dim-bar-track"><div class="dim-bar-fill ' + levelClass + '" data-width="' + pct + '"></div></div>'
        + '</div>'
        + '<div class="dim-desc">' + desc + '</div>';
      grid.appendChild(card);
    });

    // Show result
    var section = document.getElementById('resultSection');
    section.classList.add('visible');
    window.scrollTo({ top: 0, behavior: 'smooth' });

    // Animate bars
    setTimeout(function() {
      grid.querySelectorAll('.dim-bar-fill').forEach(function(bar) {
        bar.style.width = bar.getAttribute('data-width') + '%';
      });
    }, 200);
  }

  function restartQuiz() {
    // Reset
    answers = {};
    currentStep = 1;
    document.querySelectorAll('input[type="radio"]').forEach(function(r) { r.checked = false; });
    document.getElementById('resultSection').classList.remove('visible');
    // Hide all cards, show first
    for (var i = 1; i <= totalQ; i++) {
      var card = document.getElementById('step-' + i);
      if (i === 1) {
        card.classList.remove('hidden');
        card.classList.add('slide-in');
        setTimeout(function() { card.classList.remove('slide-in'); }, 400);
      } else {
        card.classList.add('hidden');
      }
      // Disable next buttons
      var btn = card.querySelector('.btn-next');
      if (btn) btn.disabled = true;
    }
    updateProgress();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  // ── Init ──────────────────────────────────────────────────────
  renderCards();
  </script>
