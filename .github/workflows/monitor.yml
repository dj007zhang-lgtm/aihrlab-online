name: Website Monitoring

on:
  schedule:
    # 每10分钟运行一次
    - cron: '*/10 * * * *'
  workflow_dispatch:  # 允许手动触发

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: pip install requests
        
      - name: Run monitoring script
        run: python website-monitor.py
        continue-on-error: true  # 即使监控失败也继续
        
      - name: Check website availability
        run: |
          echo "🔍 检查网站可用性..."
          
          # 检查首页
          status_code=$(curl -s -o /dev/null -w "%{http_code}" https://www.aihrlab.online/)
          if [ "$status_code" != "200" ]; then
            echo "❌ 首页不可用！HTTP状态码: $status_code"
            exit 1
          fi
          echo "✅ 首页可用 (HTTP $status_code)"
          
          # 检查文章页面
          status_code=$(curl -s -o /dev/null -w "%{http_code}" https://www.aihrlab.online/articles/ai-bounded-rationality.html)
          if [ "$status_code" != "200" ]; then
            echo "❌ 文章页面不可用！HTTP状态码: $status_code"
            exit 1
          fi
          echo "✅ 文章页面可用 (HTTP $status_code)"
          
          echo "✅ 所有页面可用！"
        continue-on-error: true
